<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="760" viewBox="0 0 1800 760" role="img" aria-labelledby="title desc">
  <title id="title">Docu Meter architecture</title>
  <desc id="desc">Horizontal flow: client app sends a bearer API key to FastAPI, which validates the key using prefix and digest, enforces Redis rate limits and Postgres quotas, runs deterministic document analysis, records usage, and exposes usage and key status in the Next.js dashboard secured by Clerk.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <style>
      .bg{fill:#f8fafc}.title{font:700 44px Inter,Arial,sans-serif;fill:#0f172a}.subtitle{font:400 24px Inter,Arial,sans-serif;fill:#475569}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:24;filter:url(#shadow)}.box-blue{fill:#eff6ff;stroke:#93c5fd}.box-green{fill:#ecfdf5;stroke:#86efac}.box-amber{fill:#fffbeb;stroke:#fcd34d}.label{font:700 26px Inter,Arial,sans-serif;fill:#0f172a}.small{font:400 20px Inter,Arial,sans-serif;fill:#475569}.pill{fill:#dbeafe;stroke:#bfdbfe}.pilltext{font:700 18px Inter,Arial,sans-serif;fill:#1d4ed8}.line{stroke:#2563eb;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1800" height="760"/>
  <text x="80" y="80" class="title">Docu Meter request metering architecture</text>
  <text x="80" y="122" class="subtitle">API key identity → Redis rate limit → project quota → service execution → Postgres usage metrics → dashboard visibility</text>

  <g transform="translate(80 210)">
    <rect class="box box-blue" width="245" height="160" rx="24"/>
    <text x="28" y="56" class="label">Client app</text>
    <text x="28" y="92" class="small">Developer sends</text>
    <text x="28" y="120" class="small">Bearer API key</text>
  </g>
  <path class="line" d="M 335 290 L 430 290"/>

  <g transform="translate(450 210)">
    <rect class="box" width="260" height="160" rx="24"/>
    <text x="28" y="56" class="label">FastAPI</text>
    <text x="28" y="92" class="small">Protected endpoint</text>
    <text x="28" y="120" class="small">/v1/documents/process</text>
  </g>
  <path class="line" d="M 720 290 L 815 290"/>

  <g transform="translate(835 210)">
    <rect class="box box-amber" width="285" height="160" rx="24"/>
    <text x="28" y="52" class="label">API key lookup</text>
    <text x="28" y="88" class="small">Prefix + HMAC digest</text>
    <text x="28" y="116" class="small">Raw token never stored</text>
  </g>
  <path class="line" d="M 1130 290 L 1225 290"/>

  <g transform="translate(1245 210)">
    <rect class="box box-green" width="255" height="160" rx="24"/>
    <text x="28" y="52" class="label">Redis limit</text>
    <text x="28" y="88" class="small">Fixed-window</text>
    <text x="28" y="116" class="small">per project</text>
  </g>

  <path class="line" d="M 1372 380 L 1372 472 L 1182 472"/>
  <g transform="translate(850 415)">
    <rect class="box" width="315" height="150" rx="24"/>
    <text x="28" y="52" class="label">Postgres quota</text>
    <text x="28" y="88" class="small">Monthly project usage</text>
    <text x="28" y="116" class="small">checked before work</text>
  </g>
  <path class="line" d="M 840 490 L 715 490"/>

  <g transform="translate(420 415)">
    <rect class="box box-blue" width="275" height="150" rx="24"/>
    <text x="28" y="52" class="label">Analyzer</text>
    <text x="28" y="88" class="small">Document service</text>
    <text x="28" y="116" class="small">returns safe output</text>
  </g>
  <path class="line" d="M 410 490 L 315 490"/>

  <g transform="translate(80 415)">
    <rect class="box box-green" width="215" height="150" rx="24"/>
    <text x="28" y="52" class="label">Usage event</text>
    <text x="28" y="88" class="small">Units recorded</text>
    <text x="28" y="116" class="small">for reporting</text>
  </g>

  <path class="line" d="M 295 565 C 430 660, 890 660, 1070 565"/>
  <g transform="translate(1090 415)">
    <rect class="box" width="300" height="150" rx="24"/>
    <text x="28" y="52" class="label">Next.js dashboard</text>
    <text x="28" y="88" class="small">Usage cards + key table</text>
    <text x="28" y="116" class="small">masked/revocable keys</text>
  </g>
  <path class="line" d="M 1400 490 L 1495 490"/>

  <g transform="translate(1515 415)">
    <rect class="box box-amber" width="205" height="150" rx="24"/>
    <text x="28" y="52" class="label">Clerk auth</text>
    <text x="28" y="88" class="small">User session</text>
    <text x="28" y="116" class="small">workspace sync</text>
  </g>

  <g transform="translate(80 650)">
    <rect class="pill" width="560" height="46" rx="23"/>
    <text x="24" y="30" class="pilltext">No secrets displayed: only masked keys and aggregate usage are shown.</text>
  </g>
</svg>
